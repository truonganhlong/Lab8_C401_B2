# Data contract — Lab Day 10 (tiếp nối artifact CS + IT Helpdesk)
# Sinh viên bổ sung owner, SLA freshness, và nguồn canonical.

version: "1.0"
dataset: "kb_chunk_export"
owner_team: "Data Platform + Knowledge Ops"

source_map:
  - source: "data/raw/policy_export_dirty.csv"
    ingest_method: "batch_csv_export"
    primary_failure_modes:
      - "duplicate_chunk_text"
      - "missing_effective_date"
      - "unknown_doc_id"
      - "invalid_effective_date_format"
    metrics:
      - "raw_records"
      - "cleaned_records"
      - "quarantine_records"
  - source: "data/docs/policy_refund_v4.txt"
    ingest_method: "canonical_reference_text"
    primary_failure_modes:
      - "stale_refund_window_14d"
      - "version_drift"
    metrics:
      - "refund_no_stale_14d_window"
      - "hits_forbidden.q_refund_window"
  - source: "data/docs/hr_leave_policy.txt"
    ingest_method: "canonical_reference_text"
    primary_failure_modes:
      - "stale_hr_policy_effective_date"
      - "stale_10d_annual_leave_text"
    metrics:
      - "hr_leave_no_stale_10d_annual"
      - "quarantine_records"

schema_cleaned:
  chunk_id:
    type: string
    required: true
    description: "ID ổn định sau clean (thường hash hoặc doc_id + seq)"
  doc_id:
    type: string
    required: true
    description: "Khóa logic tài liệu nguồn (vd policy_refund_v4)"
  chunk_text:
    type: string
    required: true
    constraints:
      min_length: 8
  effective_date:
    type: date
    required: true
  exported_at:
    type: datetime
    required: true

quality_rules:
  - id: "no_duplicate_chunk_text"
    severity: "warn"
  - id: "no_stale_refund_window"
    description: "Không được để chunk policy refund chứa cửa sổ 14 ngày (lệch so với v4 = 7 ngày)"
    severity: "halt"

freshness:
  measured_at: "publish"  # ingest | cleaned | publish
  sla_hours: 24
  alert_channel: "artifacts/logs + manifest freshness check"

canonical_sources:
  - path: "data/docs/policy_refund_v4.txt"
    doc_id: "policy_refund_v4"
  - path: "data/docs/sla_p1_2026.txt"
    doc_id: "sla_p1_2026"
  - path: "data/docs/it_helpdesk_faq.txt"
    doc_id: "it_helpdesk_faq"
  - path: "data/docs/hr_leave_policy.txt"
    doc_id: "hr_leave_policy"

# Baseline allowlist export — nhóm mở rộng doc mới phải đồng bộ cleaning_rules + contract.
allowed_doc_ids:
  - policy_refund_v4
  - sla_p1_2026
  - it_helpdesk_faq
  - hr_leave_policy

# Merit/Distinction: có thể đưa cutoff versioning vào env và tham chiếu ở đây (tránh hard-code trong code).
policy_versioning:
  hr_leave_min_effective_date: "2026-01-01"
